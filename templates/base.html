<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}PsicoApp{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-psicoapp { background-color: #C0392B; }
    body { background-color: #f8f9fa; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-psicoapp navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">PsicoApp</a>
      <div class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <a class="nav-link text-white" href="{% url 'cuentas:logout' %}">
            Cerrar sesion
          </a>
        {% else %}
          <a class="nav-link text-white" href="{% url 'gestion_usuarios:ingresar_pin' %}">
            Fui invitado
          </a>
          <a class="nav-link text-white" href="{% url 'cuentas:login' %}">
            Iniciar sesion
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container mt-3">
    {% if messages %}
      {% for mensaje in messages %}
        <div class="alert alert-{{ mensaje.tags }} alert-dismissible fade show" role="alert">
          {{ mensaje }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  </div>

  <main class="container my-4">
    {% block contenido %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
