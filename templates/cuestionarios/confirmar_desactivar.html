{% extends "base.html" %}
{% block titulo %}Quitar pregunta{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h4>¿Quitar esta pregunta?</h4>
        <p class="text-muted">"{{ pregunta.texto }}"</p>
        <p class="small">La pregunta se desactiva pero no se borra de la base de datos.</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Si, quitar</button>
          <a href="{% url 'cuestionarios:detalle' pregunta.cuestionario.pk %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
