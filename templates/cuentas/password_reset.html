{% extends "base.html" %}
{% block titulo %}Recuperar contrasena{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-3">Recuperar contrasena</h4>
        <p class="text-muted">Ingresa tu correo y te enviaremos un enlace para restablecer tu contrasena.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Correo electronico</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-danger w-100">Enviar enlace</button>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'cuentas:login' %}">Volver al login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
