{% extends "base.html" %}
{% block titulo %}Rechazar especialista — PsicoApp{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header" style="background-color:#C0392B; color:white;">
        <h5 class="mb-0">Rechazar solicitud de especialista</h5>
      </div>
      <div class="card-body">
        <p class="mb-1"><strong>Nombre:</strong> {{ especialista.get_full_name }}</p>
        <p class="mb-3"><strong>Email:</strong> {{ especialista.email }}</p>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Motivo del rechazo</label>
            <textarea name="motivo" class="form-control" rows="4"
                      placeholder="Ingresa el motivo del rechazo..." required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Confirmar rechazo</button>
            <a href="{% url 'cuentas:dashboard_admin' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
